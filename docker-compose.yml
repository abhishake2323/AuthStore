version: '3.8'

services:
  api-gateway:
    build: 
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8443:8443"
    environment:
      - AUTH_SERVICE_URI=http://auth-service:8081
      - STORAGE_SERVICE_URI=http://storage-service:8082
      - VAULT_KEYSTORE_PASSWORD=${VAULT_KEYSTORE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - auth-service
      - storage-service

  auth-service:
    build: 
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

  storage-service:
    build: 
      context: ./storage-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - UDP_LOG_HOST=logging-service
    depends_on:
      - logging-service

  logging-service:
    build: 
      context: ./logging-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - JWT_SECRET=${JWT_SECRET}
