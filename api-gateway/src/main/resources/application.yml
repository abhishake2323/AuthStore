server:
  port: 8443
  ssl:
    enabled: true
    key-store: file:vault-keystore.p12
    key-store-password: ${VAULT_KEYSTORE_PASSWORD}
    key-password: ${VAULT_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    enabled-protocols: TLSv1.3

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth

        - id: storage-service
          uri: ${STORAGE_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/vault/**
          filters:
            - name: CircuitBreaker
              args:
                name: storageCircuitBreaker
                fallbackUri: forward:/fallback/storage
